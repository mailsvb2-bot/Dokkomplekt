name: Apply deep audit patch

on:
  push:
    branches:
      - audit-fix-v1491
    paths:
      - .github/workflows/apply-deep-audit-patch.yml

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: audit-fix-v1491
      - name: Apply checked deep audit patch
        run: |
          set -euo pipefail
          base64 -d > deep_audit.patch <<'PATCH64'

PATCH64
          git apply --index deep_audit.patch
          rm -f deep_audit.patch .github/workflows/apply-deep-audit-patch.yml
          git add -u .github/workflows/apply-deep-audit-patch.yml
          git config user.name "mailsvb2-bot"
          git config user.email "254540704+mailsvb2-bot@users.noreply.github.com"
          git commit -m "Apply deep audit fixes"
          git push origin HEAD:audit-fix-v1491
