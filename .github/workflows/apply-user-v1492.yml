name: Apply user v1492 files

on:
  push:
    branches:
      - v1492pl
    paths:
      - .github/workflows/apply-user-v1492.yml

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v1492pl
      - run: |
          set -euo pipefail
          git config user.name "mailsvb2-bot"
          git config user.email "254540704+mailsvb2-bot@users.noreply.github.com"
          git fetch origin polish-v1492
          git checkout origin/polish-v1492 -- actions_required_fields_popup.py dialog_fields_core.py dialog_fields_popup.py diary_constants.py i18n_strings.py icd10_f_data.py icd10_f_search.py medical_admission_resolver.py medical_formatting.py medical_language_detector.py medical_parser.py medical_text_utils.py personal_document_buttons.py regulatory_caucasus_aliases.py regulatory_document_classifier.py tests/test_polish_full_scenario_v1492.py universal_scanner.py
          rm -f .github/workflows/apply-user-v1492.yml
          git add -A
          git commit -m "Apply user scenario v1492 files"
          git push origin HEAD:v1492pl
