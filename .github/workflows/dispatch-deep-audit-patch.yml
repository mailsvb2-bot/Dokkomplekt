name: Dispatch deep audit patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/dispatch-deep-audit-patch.yml

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: audit-fix-v1491
      - name: Apply patch to audit branch
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-deep-audit-patch.yml').read_text(encoding='utf-8')
          start = "base64 -d > deep_audit.patch <<'PATCH64'\n"
          i = text.index(start) + len(start)
          j = text.index('\nPATCH64', i)
          Path('deep_audit.patch.b64').write_text(text[i:j].strip() + '\n', encoding='utf-8')
          PY
          base64 -d deep_audit.patch.b64 > deep_audit.patch
          git apply --index deep_audit.patch
          rm -f deep_audit.patch deep_audit.patch.b64 .github/workflows/apply-deep-audit-patch.yml
          git add -u .github/workflows/apply-deep-audit-patch.yml
          git config user.name "mailsvb2-bot"
          git config user.email "254540704+mailsvb2-bot@users.noreply.github.com"
          git commit -m "Apply deep audit fixes"
          git push origin HEAD:audit-fix-v1491
      - name: Remove dispatcher from main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Cleanup dispatcher
        run: |
          set -euo pipefail
          rm -f .github/workflows/dispatch-deep-audit-patch.yml
          git add -u .github/workflows/dispatch-deep-audit-patch.yml
          git config user.name "mailsvb2-bot"
          git config user.email "254540704+mailsvb2-bot@users.noreply.github.com"
          git commit -m "Remove deep audit dispatcher" || exit 0
          git push origin HEAD:main
