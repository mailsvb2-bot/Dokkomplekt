name: Rust License Workspace

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-license.yml"
  push:
    branches:
      - rust-license-core-and-server
    paths:
      - "rust/**"
      - ".github/workflows/rust-license.yml"

jobs:
  rust-license:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo test
        shell: bash
        run: |
          set +e
          cargo test --workspace > /tmp/dokkomplekt-rust-test.log 2>&1
          code=$?
          tail -160 /tmp/dokkomplekt-rust-test.log
          exit $code

      - name: Cargo clippy
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets -- -D warnings > /tmp/dokkomplekt-rust-clippy.log 2>&1
          code=$?
          tail -160 /tmp/dokkomplekt-rust-clippy.log
          exit $code
