name: Rust License Workspace

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-license.yml"
  push:
    branches:
      - rust-license-core-and-server
    paths:
      - "rust/**"
      - ".github/workflows/rust-license.yml"

jobs:
  rust-license:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
